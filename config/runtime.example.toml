[runtime]
startup_mode = "observation"
default_strategy_path = "strategies/examples/micro_silver_elephant_tradovate_v1.md"
allow_sqlite_fallback = false

[market_data]
dataset = "GLBX.MDP3"
# Optional advanced override. Omit this to let the Databento client select the
# default live gateway for the configured dataset.
# gateway = "live.databento.com:13000"
# Prefer supplying the API key through DATABENTO_API_KEY or
# TV_BOT__MARKET_DATA__API_KEY.
# api_key = "db-..."

[broker]
environment = "demo"
# One runtime process should target one Tradovate environment at a time:
# demo for paper routing, live for live routing.
http_base_url = "https://demo.tradovateapi.com/v1"
websocket_url = "wss://demo.tradovateapi.com/v1/websocket"
# Prefer supplying sensitive auth fields through environment variables:
# TV_BOT__BROKER__USERNAME
# TV_BOT__BROKER__PASSWORD
# TV_BOT__BROKER__CID
# TV_BOT__BROKER__SEC
app_id = "tv-bot-core"
app_version = "0.1.0"
device_id = "local-dev"
# Set the paper or live account name explicitly when you want deterministic
# routing instead of automatic selection.
# paper_account_name = "SIM123456"
# live_account_name = "LIVE123456"

[persistence]
primary_url = "postgres://postgres:postgres@localhost:5432/tv_bot_core"

[persistence.sqlite_fallback]
enabled = false
path = "data/tv_bot_core.sqlite"

[control_api]
http_bind = "127.0.0.1:8080"
websocket_bind = "127.0.0.1:8081"

[remote_access]
# Leave trusted header parsing off unless the runtime stays bound to localhost
# and only a local reverse proxy injects identity headers.
trust_local_identity_headers = false
require_authenticated_identity_for_privileged_commands = false
# authenticated_user_header = "x-authenticated-user"
# authenticated_display_name_header = "x-authenticated-name"
# authenticated_session_header = "x-authenticated-session"
# authenticated_device_header = "x-authenticated-device"
# authenticated_provider_header = "x-authenticated-provider"
# authenticated_roles_header = "x-authenticated-roles"

[logging]
level = "info"
json = false
